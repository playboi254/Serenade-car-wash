kind = "web"
previewPath = "/"
title = "Serenade Wash"
version = "1.0.0"
id = "artifacts/aquasonic"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20579

[services.development]
run = "pnpm --filter @workspace/aquasonic run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aquasonic...", "run", "build" ]
publicDir = "artifacts/aquasonic/dist"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20579"
BASE_PATH = "/"
